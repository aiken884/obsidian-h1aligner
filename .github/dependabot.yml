version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: monthly
    groups:
      dev-dependencies:
        applies-to: version-updates
        patterns: ["*"]
        update-types: ["minor", "patch"]
    # obsidian typings are pinned to the support floor (minAppVersion) and
    # bumped deliberately — see RELEASING.md.
    ignore:
      - dependency-name: obsidian

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    groups:
      actions:
        patterns: ["*"]
