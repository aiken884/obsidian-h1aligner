name: Release Obsidian plugin

# Trigger: push an un-prefixed version tag, e.g. `git push origin 0.1.0`.
# The Obsidian community plugin loader requires the release tag to exactly
# match manifest.json's version — no `v` prefix.
on:
  push:
    tags: ["*"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build plugin
        run: npm run build

      - name: Run unit tests
        run: npm test

      - name: Run end-to-end tests
        run: npm run test:e2e

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Create draft release with plugin assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            --title="$tag" \
            --draft \
            main.js manifest.json styles.css
